name: Lambda Go Terraform Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
jobs:
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest

    env:
      # Terraform Variables
      TF_VAR_aws_region: ${{ vars.AWS_REGION }}
      TF_VAR_assume_role: ${{ secrets.TERRAFORM_ASSUME_ROLE }}
      TF_VAR_lambda: ${{ vars.TERRAFORM_LAMBDA }}
      TF_VAR_tags: ${{ vars.TERRAFORM_TAGS }}

      # Backend Configuration Variables
      BACKEND_BUCKET: ${{ vars.TERRAFORM_BACKEND_BUCKET }}
      BACKEND_KEY: ${{ vars.TERRAFORM_BACKEND_KEY }}
      BACKEND_ROLE_ARN: ${{ secrets.TERRAFORM_BACKEND_ROLE_ARN }}
      BACKEND_EXTERNAL_ID: ${{ secrets.TERRAFORM_BACKEND_EXTERNAL_ID }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ vars.GO_VERSION }}

      - name: Create Required Directories
        run: |
          mkdir -p build
          mkdir -p output

      - name: Download Go Dependencies
        run: go mod tidy

      - name: Build Lambda Bootstrap Binary
        run: |
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 \
          go build -tags lambda.norpc -trimpath -ldflags="-s -w" -o build/bootstrap .

      - name: Validate Generated Binary
        run: |
          ls -lh build/bootstrap
          file build/bootstrap

      - name: Package Lambda Artifact
        run: |
          cd build
          zip -j ../output/function.zip bootstrap
      
      - name: Validate Packaged Artifact
        run: |
          ls -lh output/function.zip
          unzip -l output/function.zip

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ vars.TF_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_TERRAFORM_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_TERRAFORM_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Generate Backend Configuration
        working-directory: ./infra
        run: |
          mkdir -p .terraform-config
          cat > .terraform-config/backend.hcl << EOF
          bucket         = "${BACKEND_BUCKET}"
          key            = "${BACKEND_KEY}"
          assume_role = {
            role_arn    = "${BACKEND_ROLE_ARN}"
            external_id = "${BACKEND_EXTERNAL_ID}"
          }
          EOF

      - name: Terraform Format Check
        working-directory: ./infra
        run: terraform fmt -check -recursive

      - name: Terraform Init
        working-directory: ./infra
        run: |
          terraform init -upgrade -input=false -backend-config=.terraform-config/backend.hcl

      - name: Terraform Validate
        working-directory: ./infra
        run: terraform validate

      - name: Terraform Plan
        working-directory: ./infra
        run: terraform plan -input=false -out=tfplan

      - name: Upload Terraform Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-artifact
          path: |
            infra/tfplan
            output/function.zip
          if-no-files-found: error
          retention-days: 7

  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: plan

    if: github.ref == 'refs/heads/main'

    environment:
      name: production

    env:
      # Terraform Variables
      TF_VAR_aws_region: ${{ vars.AWS_REGION }}
      TF_VAR_assume_role: ${{ secrets.TERRAFORM_ASSUME_ROLE }}
      TF_VAR_lambda: ${{ vars.TERRAFORM_LAMBDA }}
      TF_VAR_tags: ${{ vars.TERRAFORM_TAGS }}

      # Backend Configuration Variables
      BACKEND_BUCKET: ${{ vars.TERRAFORM_BACKEND_BUCKET }}
      BACKEND_KEY: ${{ vars.TERRAFORM_BACKEND_KEY }}
      BACKEND_ROLE_ARN: ${{ secrets.TERRAFORM_BACKEND_ROLE_ARN }}
      BACKEND_EXTERNAL_ID: ${{ secrets.TERRAFORM_BACKEND_EXTERNAL_ID }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Terraform Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-artifact
          path: .

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ vars.TF_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_TERRAFORM_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_TERRAFORM_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Generate Backend Configuration
        working-directory: ./infra 
        run: |
          mkdir -p .terraform-config
          cat > .terraform-config/backend.hcl << EOF
          bucket         = "${BACKEND_BUCKET}"
          key            = "${BACKEND_KEY}"
          assume_role = {
            role_arn    = "${BACKEND_ROLE_ARN}"
            external_id = "${BACKEND_EXTERNAL_ID}"
          }
          EOF

      - name: Terraform Init
        working-directory: ./infra
        run: |
          terraform init -upgrade -input=false -backend-config=.terraform-config/backend.hcl

      - name: Terraform Apply
        working-directory: ./infra
        run: terraform apply -input=false tfplan